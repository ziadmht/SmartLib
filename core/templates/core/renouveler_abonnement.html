{% extends 'core/base.html' %}
{% block title %}Renouvellement Sceau - SmartLib Admin{% endblock %}

{% block content %}
<div class="reveal">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card card-vault shadow-2xl border-0 overflow-hidden">
                <div class="card-header bg-oxford-blue text-white py-4 text-center">
                    <i class="fas fa-history fa-3x text-gold-leaf mb-3"></i>
                    <h3 class="fw-bold text-uppercase letter-spacing-2">Renouvellement Forcé</h3>
                    <p class="mb-0 opacity-75 small">Abonnement de {{ abonnement.adherent.username|upper }}</p>
                </div>
                <div class="card-body p-5">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4 text-center">
                            <label class="form-label text-muted text-uppercase small fw-bold mb-3">Sélectionner la nouvelle période</label>
                            <div class="d-grid gap-3">
                                <button type="submit" name="duree" value="mensuel" class="btn btn-academic py-3">
                                    Prolonger de 1 MOIS
                                </button>
                                <button type="submit" name="duree" value="annuel" class="btn btn-outline-dark rounded-0 border-2 py-3 fw-bold">
                                    Prolonger de 1 AN (OFFICIEL)
                                </button>
                            </div>
                        </div>
                    </form>
                    <div class="text-center">
                        <a href="{% url 'admin_abonnements' %}" class="text-muted small text-decoration-none">← Annuler et revenir au registre</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
